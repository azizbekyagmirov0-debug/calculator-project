<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Super Kalkulyator</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; position: relative; }
        .hidden { display: none; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .key { padding: 12px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .key.op { background: #e2e6ea; }
        .key.eq { background: #28a745; color: white; grid-column: span 2; }
        .key.bksp { background: #ff9800; color: white; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 5px; }
        #logs { max-height: 150px; overflow-y: auto; text-align: left; font-size: 11px; background: #f9f9f9; padding: 5px; border: 1px solid #eee; }
        .error { color: #dc3545; font-size: 12px; margin-top: 5px; }
        
        /* Google loginni butunlay yashirish */
        #g_id_onload, .g_id_signin { 
            position: absolute; 
            left: -9999px; 
            width: 1px; 
            height: 1px; 
            overflow: hidden; 
        }

        /* Yashirin panel uchun maxsus stil */
        #secretAdmin {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginBox" class="box">
        <h2>Kirish</h2>
        
        <input type="email" id="loginEmail" placeholder="Email (gmail.com)" required>
        <input type="password" id="loginPassword" placeholder="Parol" required>
        <button class="btn-blue" onclick="loginWithEmail()">Kirish</button>
        
        <div style="margin: 15px 0;">
            <small>yoki</small>
        </div>
        
        <button class="btn-green" onclick="showGoogleLogin()">Google orqali kirish</button>
        <div id="loginError" class="error"></div>
        
        <!-- YASHIRIN PANEL ENDI SHU YERDA (TEPADA) -->
        <div id="secretAdmin" class="hidden">
            <h4 style="margin: 5px 0; color: #333;">🔒 Server Paroli</h4>
            <input type="password" id="adminPass" placeholder="Parolni kiriting">
            <button class="btn-blue" onclick="adminCheck()">Serverga Kirish</button>
        </div>
        
        <hr style="margin: 20px 0;">
        
        <!-- Google login (yashirin) -->
        <div id="g_id_onload"
             data-client_id="887156417417-hor0lf6v3v57c39kf1jfhmldvrrt7v0j.apps.googleusercontent.com"
             data-callback="handleLogin"
             data-auto_prompt="false"
             data-prompt="select_account">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="large"></div>
    </div>

    <!-- KALKULYATOR -->
    <div id="calcBox" class="box hidden">
        <img id="uImg" class="avatar" src="">
        <h3 id="greeting" style="margin:0; color: #007bff;"></h3>
        <small id="uId" style="color:#777;"></small>
        <input type="text" id="disp" readonly style="text-align:right; font-size:20px; margin-top:15px;">
        <div class="grid">
            <button class="key" onclick="add('7')">7</button> <button class="key" onclick="add('8')">8</button> <button class="key" onclick="add('9')">9</button> <button class="key op" onclick="add('/')">÷</button>
            <button class="key" onclick="add('4')">4</button> <button class="key" onclick="add('5')">5</button> <button class="key" onclick="add('6')">6</button> <button class="key op" onclick="add('*')">×</button>
            <button class="key" onclick="add('1')">1</button> <button class="key" onclick="add('2')">2</button> <button class="key" onclick="add('3')">3</button> <button class="key op" onclick="add('-')">-</button>
            <button class="key" onclick="add('0')">0</button> <button class="key" onclick="add('.')">.</button> <button class="key op" onclick="add('**')">^</button> <button class="key op" onclick="add('+')">+</button>
            <button class="key bksp" onclick="bksp()"></button> <button class="key" onclick="clr()">C</button> <button class="key eq" onclick="calc()">=</button>
        </div>
        <button class="btn-red" onclick="logout()" style="margin-top:15px;">Chiqish</button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminBox" class="box hidden">
        <h2>Server Paneli</h2>
        <div id="logs">Yuklanmoqda...</div>
        <button class="btn-red" onclick="location.reload()">Chiqish</button>
    </div>

    <script>
        let currentUser = null;
        let isNewCalculation = false;
        let secretInput = '';
        const SECRET_CODE = '2012201201010303';

        // Google login - har safar yangi akkaunt tanlash
        function showGoogleLogin() {
            if (window.google && google.accounts && google.accounts.id) {
                google.accounts.id.initialize({
                    client_id: '887156417417-hor0lf6v3v57c39kf1jfhmldvrrt7v0j.apps.googleusercontent.com',
                    callback: handleLogin
                });
                google.accounts.id.prompt((notification) => {
                    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                        alert("Iltimos, brauzer sozlamalaridan popup ruxsatini yoqing.");
                    }
                });
            } else {
                alert("Google yuklanmoqda, kuting...");
            }
        }

        // Email/parol bilan kirish
        async function loginWithEmail() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!email || !password) {
                errorDiv.textContent = "Email va parolni kiriting!";
                return;
            }
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const result = await res.json();
                
                if (result.success) {
                    currentUser = result.user;
                    showCalculator();
                    errorDiv.textContent = "";
                } else {
                    errorDiv.textContent = "Gmail topilmadi! Google orqali kiring.";
                }
            } catch(e) {
                errorDiv.textContent = "Server ishmayapti!";
            }
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        async function handleLogin(response) {
            const data = parseJwt(response.credential);
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: data.email, name: data.name, picture: data.picture })
                });
                const result = await res.json();
                if(result.success) {
                    currentUser = result.user;
                    showCalculator();
                }
            } catch(e) { alert("Server ishmayapti!"); }
        }

        function showCalculator() {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('calcBox').classList.remove('hidden');
            document.getElementById('greeting').innerText = `Salom, ${currentUser.name}!`;
            document.getElementById('uId').innerText = "ID: " + currentUser.id;
            document.getElementById('uImg').src = currentUser.picture || `https://ui-avatars.com/api/?name=${currentUser.name}&background=random`;
        }

        function add(v) {
            const disp = document.getElementById('disp');
            if (isNewCalculation) {
                disp.value = '';
                isNewCalculation = false;
            }
            disp.value += v;
            
            secretInput += v;
            checkSecretCode();
            
            if (secretInput.length > SECRET_CODE.length) {
                secretInput = secretInput.slice(-SECRET_CODE.length);
            }
        }

        function clr() { 
            document.getElementById('disp').value = ''; 
            isNewCalculation = false;
            secretInput = '';
        }

        function bksp() {
            const disp = document.getElementById('disp');
            disp.value = disp.value.slice(0, -1);
            secretInput = secretInput.slice(0, -1);
        }

        function checkSecretCode() {
            if (secretInput === SECRET_CODE) {
                setTimeout(() => {
                    const adminPanel = document.getElementById('secretAdmin');
                    adminPanel.classList.remove('hidden');
                    
                    // Ekranni yuqoriga siljitish (scroll)
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    
                    alert("🎉 Yashirin panel ochildi!");
                    secretInput = '';
                    document.getElementById('disp').value = '';
                }, 100);
            }
        }

        async function calc() {
            const d = document.getElementById('disp');
            try {
                const res = new Function('return ' + d.value)();
                const oldVal = d.value;
                d.value = res;
                isNewCalculation = true;
                
                if(currentUser) {
                    fetch('/api/calc/history', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: currentUser.id, expression: oldVal, result: res })
                    });
                }
            } catch { d.value = "Xato"; }
        }

        async function logout() {
            if(currentUser) {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: currentUser.id })
                });
            }
            location.reload();
        }

        async function adminCheck() {
            const p = document.getElementById('adminPass').value;
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: p })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminBox').classList.remove('hidden');
                let html = "<b>Foydalanuvchilar:</b><br>";
                data.users.forEach(u => {
                    html += `${u.id} - ${u.name} (${u.email})<br>`;
                    html += `Kirish: ${u.loginTime || '-'} | Chiqish: ${u.logoutTime || '-'}<br><br>`;
                });
                html += "<br><b>Loglar:</b><br>";
                data.logs.forEach(l => html += `[${l.time}] ${l.userId}: ${l.action} - ${l.details}<br>`);
                document.getElementById('logs').innerHTML = html;
            } else { alert("Parol xato!"); }
        }
    </script>
</body>
</html>
